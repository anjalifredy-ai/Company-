<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intern Search</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.logo{
font-size:40px;
font-weight:bold;
margin-bottom:20px;
}

.result{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:15px;
}
</style>
</head>
<body>

<div class="logo">INTERN</div>

<h2 id="query"></h2>

<div class="result">
<h3>Search Results</h3>
<p>Your Intern search page is working.</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const q = params.get("q");

document.getElementById("query").innerText =
"Results for: " + q;
</script>

</body>
</html>
