<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intern Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#fff;--bg2:#f8f9fa;--bg3:#e8eaed;--border:#dfe1e5;--text:#202124;--text2:#70757a;--blue:#1a73e8;--visited:#1a0dab;--snippet:#4d5156;--card:#fff;--shadow:rgba(32,33,36,0.15);--nav:#fff;--tab:#1a73e8;}
    [data-theme="dark"]{--bg:#202124;--bg2:#303134;--bg3:#3c4043;--border:#5f6368;--text:#e8eaed;--text2:#9aa0a6;--blue:#8ab4f8;--visited:#c58af9;--snippet:#bdc1c6;--card:#303134;--shadow:rgba(0,0,0,0.4);--nav:#202124;--tab:#8ab4f8;}
    [data-incognito="true"]{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--border:#444;--text:#e0e0e0;--text2:#aaa;--blue:#a78bfa;--visited:#c4b5fd;--snippet:#ccc;--card:#16213e;--shadow:rgba(0,0,0,0.5);--nav:#1a1a2e;--tab:#a78bfa;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Roboto',Arial,sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s;}
    .hidden{display:none!important;}

    /* ── TOP BAR ── */
    #top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;background:var(--nav);z-index:100;border-bottom:1px solid transparent;}
    .menu-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;}
    .menu-btn span{display:block;width:22px;height:2px;background:var(--text2);border-radius:2px;}
    .top-right{display:flex;align-items:center;gap:10px;}
    .incognito-badge{background:#1a1a2e;color:#a78bfa;font-size:11px;padding:3px 8px;border-radius:12px;font-weight:500;display:flex;align-items:center;gap:4px;}

    /* ── HOME PAGE ── */
    #home{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
    #home-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 16px 20px;}

    /* DOODLE / LOGO */
    .logo-wrap{margin-top:40px;margin-bottom:24px;cursor:pointer;}
    .logo{font-family:'Google Sans',Arial,sans-serif;font-size:56px;font-weight:700;letter-spacing:-2px;user-select:none;}
    .logo span:nth-child(1){color:#4285F4}.logo span:nth-child(2){color:#EA4335}
    .logo span:nth-child(3){color:#FBBC05}.logo span:nth-child(4){color:#4285F4}
    .logo span:nth-child(5){color:#34A853}.logo span:nth-child(6){color:#EA4335}
    .incognito-logo{font-size:42px;text-align:center;}

    /* SEARCH BAR */
    .search-bar-wrap{width:100%;max-width:480px;}
    .search-bar{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:12px 16px;gap:10px;box-shadow:0 1px 6px var(--shadow);}
    .search-bar input{flex:1;border:none;outline:none;font-size:16px;color:var(--text);background:transparent;font-family:'Roboto',Arial,sans-serif;}
    .search-bar input::placeholder{color:var(--text2);}
    .sb-icon{background:none;border:none;cursor:pointer;padding:2px;display:flex;color:var(--text2);}
    .sb-divider{width:1px;height:22px;background:var(--border);}

    /* AI MODE CHIPS */
    .chips-row{display:flex;gap:8px;margin-top:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;width:100%;max-width:480px;}
    .chips-row::-webkit-scrollbar{display:none;}
    .chip{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:0 1px 3px var(--shadow);}
    .chip:hover{background:var(--bg2);}
    .chip.active{background:#e8f0fe;border-color:#4285F4;color:#4285F4;}
    [data-theme="dark"] .chip.active{background:#1a2744;border-color:#8ab4f8;color:#8ab4f8;}

    /* SPORTS CARDS */
    .section-title{width:100%;max-width:480px;font-size:13px;color:var(--text2);font-weight:500;margin:20px 0 10px;letter-spacing:0.3px;text-transform:uppercase;}
    .sports-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;width:100%;max-width:480px;padding-bottom:4px;}
    .sports-row::-webkit-scrollbar{display:none;}
    .sport-card{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 14px;min-width:170px;box-shadow:0 1px 4px var(--shadow);}
    .sport-type{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;justify-content:space-between;}
    .sport-status{background:#34A853;color:#fff;padding:2px 6px;border-radius:8px;font-size:9px;}
    .sport-status.upcoming{background:#4285F4;}
    .sport-status.finished{background:var(--text2);}
    .sport-team{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:13px;}
    .sport-team .flag{font-size:16px;}
    .sport-score{font-weight:700;font-size:14px;color:var(--text);}
    .sport-info{font-size:11px;color:var(--text2);margin-top:6px;text-align:center;}

    /* NEWS FEED */
    .news-grid{width:100%;max-width:480px;display:flex;flex-direction:column;gap:0;}
    .news-card{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;text-decoration:none;}
    .news-card:last-child{border-bottom:none;}
    .news-text{flex:1;min-width:0;}
    .news-source{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:4px;}
    .news-title{font-size:14px;color:var(--text);line-height:1.4;font-weight:500;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .news-time{font-size:11px;color:var(--text2);margin-top:4px;}
    .news-thumb{width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg2);}

    /* BOTTOM NAV */
    #bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;cursor:pointer;background:none;border:none;color:var(--text2);font-size:10px;font-family:'Roboto',Arial,sans-serif;}
    .nav-item.active{color:var(--blue);}
    .nav-item svg{width:22px;height:22px;}
    .nav-badge{background:#EA4335;color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:6px;right:calc(50% - 22px);}
    .nav-icon-wrap{position:relative;}

    /* PADDING FOR BOTTOM NAV */
    #home-content{padding-bottom:80px;}

    /* ── RESULTS PAGE ── */
    #results{display:none;min-height:100vh;background:var(--bg);padding-bottom:80px;}
    #results-nav{position:sticky;top:0;background:var(--nav);z-index:100;border-bottom:1px solid var(--border);}
    #results-nav-inner{display:flex;align-items:center;padding:8px 12px;gap:10px;}
    .mini-logo{font-family:'Google Sans',Arial,sans-serif;font-size:24px;font-weight:700;cursor:pointer;letter-spacing:-1px;flex-shrink:0;}
    .top-search{display:flex;align-items:center;border:1px solid var(--border);border-radius:24px;padding:8px 14px;gap:8px;flex:1;min-width:0;background:var(--card);}
    .top-search input{flex:1;border:none;outline:none;font-size:15px;color:var(--text);background:transparent;min-width:0;}
    .clear-btn{background:none;border:none;cursor:pointer;padding:2px;display:none;align-items:center;}
    #r-tabs{display:flex;overflow-x:auto;padding:0 8px;border-top:1px solid var(--border);scrollbar-width:none;}
    #r-tabs::-webkit-scrollbar{display:none;}
    .tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:9px 12px;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .tab-btn.active{color:var(--tab);border-bottom:3px solid var(--tab);}
    #results-body{padding:12px 14px 20px;}
    .stats{font-size:12px;color:var(--text2);margin-bottom:16px;}

    /* RESULT CARDS */
    .result-item{margin-bottom:24px;}
    .result-site{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
    .site-info{min-width:0;flex:1;}
    .site-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
    .site-url{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .result-title{display:block;font-size:18px;color:var(--visited);text-decoration:none;line-height:1.35;margin-bottom:5px;word-break:break-word;font-family:'Google Sans',Arial,sans-serif;}
    .result-title:hover{text-decoration:underline;}
    .result-snippet{font-size:13px;color:var(--snippet);line-height:1.6;word-break:break-word;}
    .result-date{font-size:12px;color:var(--text2);margin-bottom:3px;}
    .featured{background:var(--bg2);border-left:4px solid #4285F4;border-radius:0 10px 10px 0;padding:14px;margin-bottom:20px;}
    .featured-label{font-size:11px;color:#4285F4;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .featured-text{font-size:14px;color:var(--text);line-height:1.6;}
    .featured-source{font-size:12px;color:var(--text2);margin-top:6px;}

    /* IMAGES */
    .image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .image-card{display:block;text-decoration:none;border-radius:8px;overflow:hidden;background:var(--bg2);}
    .image-card img{width:100%;height:100px;object-fit:cover;display:block;}
    .image-cap{font-size:10px;color:var(--text2);padding:4px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* LOADING */
    .loading-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:12px;}
    .loading-fill{height:100%;width:40%;background:linear-gradient(90deg,#4285F4,#34A853,#FBBC05,#EA4335);animation:ldAnim 1s ease-in-out infinite;}
    @keyframes ldAnim{0%{transform:translateX(-150%)}100%{transform:translateX(300%)}}
    .loading-wrap{display:flex;justify-content:center;padding:40px 0;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top:3px solid #4285F4;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ERROR */
    .error-box{background:#fef7f0;border:1px solid #f5c6a0;border-radius:10px;padding:16px;color:#c45500;font-size:13px;}
    [data-theme="dark"] .error-box,[data-incognito="true"] .error-box{background:#3c1f00;border-color:#8a4500;color:#ffb74d;}

    /* RELATED */
    .related-box{margin-top:24px;padding:14px;background:var(--bg2);border-radius:12px;}
    .related-title{font-size:14px;color:var(--text);font-weight:500;margin-bottom:10px;}
    .related-grid{display:grid;grid-template-columns:1fr 1fr;}
    .related-chip{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;}

    /* PAGINATION */
    .pagination{display:flex;flex-direction:column;align-items:center;margin-top:32px;gap:12px;}
    .page-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;}
    .page-btn{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:7px 10px;border-radius:4px;}
    .page-num{background:none;border:none;font-size:13px;cursor:pointer;padding:7px 10px;color:var(--text2);border-radius:4px;}
    .page-num.active{color:var(--blue);font-weight:700;background:var(--bg2);}
    .pagi-logo{font-family:'Google Sans',Arial,sans-serif;font-size:26px;font-weight:700;letter-spacing:2px;}

    /* HISTORY PAGE */
    #history-page{display:none;min-height:100vh;background:var(--bg);padding:16px 16px 80px;}
    .history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .history-header h2{font-size:18px;font-family:'Google Sans',Arial,sans-serif;color:var(--text);}
    .clear-all-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:#EA4335;font-size:13px;cursor:pointer;}
    .history-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
    .history-item:hover{background:var(--bg2);margin:0 -16px;padding:12px 16px;}
    .history-query{flex:1;font-size:14px;color:var(--text);}
    .history-time{font-size:11px;color:var(--text2);}
    .del-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;font-size:16px;}
    .empty-history{text-align:center;padding:60px 20px;color:var(--text2);}
    .empty-history div{font-size:48px;margin-bottom:12px;}

    /* SETTINGS PAGE */
    #settings-page{display:none;min-height:100vh;background:var(--bg);padding:16px 16px 80px;}
    #settings-page h2{font-size:18px;font-family:'Google Sans',Arial,sans-serif;color:var(--text);margin-bottom:20px;}
    .setting-section{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
    .setting-section-title{font-size:12px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:12px 16px 6px;}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
    .setting-row:last-child{border-bottom:none;}
    .setting-row-left{display:flex;flex-direction:column;gap:2px;}
    .setting-row-label{font-size:14px;color:var(--text);}
    .setting-row-desc{font-size:12px;color:var(--text2);}
    .toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0;}
    .toggle-switch input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:0.3s;}
    .toggle-slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s;}
    input:checked+.toggle-slider{background:#4285F4;}
    input:checked+.toggle-slider:before{transform:translateX(20px);}
    .setting-select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;background:var(--bg2);color:var(--text);font-size:13px;outline:none;}
    .incognito-btn{width:100%;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;font-family:'Roboto',Arial,sans-serif;}
    [data-incognito="true"] .incognito-btn{background:#2d2b55;border-color:#a78bfa;color:#a78bfa;}
  </style>
</head>
<body>

<!-- ═══ HOME PAGE ═══ -->
<div id="home">
  <!-- Top bar -->
  <div id="top-bar">
    <button class="menu-btn" onclick="showPage('settings')">
      <span></span><span></span><span></span>
    </button>
    <div class="top-right">
      <div id="incognito-badge" class="incognito-badge hidden">🕵️ Incognito</div>
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4285F4,#34A853);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;cursor:pointer;" onclick="showPage('settings')">I</div>
    </div>
  </div>

  <div id="home-content">
    <!-- Logo -->
    <div class="logo-wrap" onclick="goHome()">
      <div class="logo" id="main-logo">
        <span>I</span><span>n</span><span>t</span><span>e</span><span>r</span><span>n</span>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-bar-wrap">
      <div class="search-bar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#9aa0a6" stroke-width="2"/><path d="M20 20l-3-3" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="home-input" type="text" placeholder="Search the web..." onkeydown="if(event.key==='Enter')doSearch()" />
        <div class="sb-divider"></div>
        <button class="sb-icon" title="Voice Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" fill="#4285F4"/><path d="M5 11a7 7 0 0014 0" stroke="#34A853" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="#FBBC05" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="22" x2="16" y2="22" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="sb-icon" title="Search by image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9V6a1 1 0 011-1h3M3 15v3a1 1 0 001 1h3M21 9V6a1 1 0 00-1-1h-3M21 15v3a1 1 0 01-1 1h-3" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="#4285F4" stroke-width="2"/></svg>
        </button>
      </div>

      <!-- Chips -->
      <div class="chips-row">
        <div class="chip active" onclick="doSearch()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Search
        </div>
        <div class="chip" onclick="doSearchTab('isch')">🖼️ Images</div>
        <div class="chip" onclick="doSearchTab('nws')">📰 News</div>
        <div class="chip" onclick="doSearchTab('vid')">▶️ Videos</div>
        <div class="chip" onclick="doSearchTab('shop')">🛒 Shopping</div>
      </div>
    </div>

    <!-- Sports -->
    <div class="section-title">🏆 Sports</div>
    <div class="sports-row" id="sports-row">
      <div class="sport-card">
        <div class="sport-type">Test <span class="sport-status finished">Stumps</span></div>
        <div class="sport-team"><span>🇳🇿 NZ</span><span class="sport-score">361/4</span></div>
        <div class="sport-team"><span>🏴󠁧󠁢󠁥󠁮󠁧󠁿 ENG</span><span class="sport-score">Yet to bat</span></div>
        <div class="sport-info">Day 1 · Stumps</div>
      </div>
      <div class="sport-card">
        <div class="sport-type">T20 <span class="sport-status upcoming">Today</span></div>
        <div class="sport-team"><span>🇮🇪 IRE</span><span class="sport-score">vs</span></div>
        <div class="sport-team"><span>🇮🇳 IND</span><span class="sport-score">6:00 PM</span></div>
        <div class="sport-info">T20I Series</div>
      </div>
      <div class="sport-card">
        <div class="sport-type">FIFA WC <span class="sport-status finished">FT</span></div>
        <div class="sport-team"><span>🏴󠁧󠁢󠁳󠁣󠁴󠁿 SCO</span><span class="sport-score">0</span></div>
        <div class="sport-team"><span>🇧🇷 BRA</span><span class="sport-score">3</span></div>
        <div class="sport-info">World Cup 2026</div>
      </div>
      <div class="sport-card">
        <div class="sport-type">FIFA WC <span class="sport-status finished">FT</span></div>
        <div class="sport-team"><span>🇵🇹 POR</span><span class="sport-score">5</span></div>
        <div class="sport-team"><span>🇺🇿 UZB</span><span class="sport-score">0</span></div>
        <div class="sport-info">World Cup 2026</div>
      </div>
    </div>

    <!-- News Feed -->
    <div class="section-title">📰 Top Stories</div>
    <div class="news-grid" id="news-feed">
      <div style="text-align:center;padding:20px;color:var(--text2);">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ RESULTS PAGE ═══ -->
<div id="results">
  <div id="results-nav">
    <div id="results-nav-inner">
      <div class="mini-logo" onclick="goHome()">
        <span style="color:#4285F4">I</span><span style="color:#EA4335">n</span><span style="color:#FBBC05">t</span><span style="color:#4285F4">e</span><span style="color:#34A853">r</span><span style="color:#EA4335">n</span>
      </div>
      <div class="top-search">
        <input id="top-input" type="text" onkeydown="if(event.key==='Enter')doSearch(
